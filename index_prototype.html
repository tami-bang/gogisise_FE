<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>고기시세 통합 프로토타입</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Config (디자인 시스템 동기화) -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand-red': '#d14734',
            'brand-primary': '#f85029',
            'brand-yellow': '#ffc700',
            'brand-blue': '#3b91c8',
            'surface': '#ffffff',
            'surface-soft': '#f5f5f5',
            'border-light': '#e5e5e5',
            'divider': '#eeeeee',
            'text-strong': '#1f1f1f',
            'text-default': '#333333',
            'text-muted': '#666666',
            'text-light': '#999999',
            'disabled': '#c7c7c7'
          },
          fontFamily: {
            sans: ['Pretendard', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- Pretendard 폰트 (BASE.md 헌법 사수) -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />

  <style>
    body {
      font-family: 'Pretendard', sans-serif;
      background-color: #f9f9f9;
      color: #333333;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }
    
    /* 모바일 레이아웃 제약 */
    .app-container {
      max-width: 480px;
      margin: 0 auto;
      background-color: #f9f9f9;
      min-height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .header-fixed {
      position: sticky;
      top: 0;
      z-index: 50;
      background-color: #ffffff;
    }

    .footer-fixed {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background-color: #ffffff;
      z-index: 60;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    }

    /* 스크롤바 숨기기 */
    ::-webkit-scrollbar {
      display: none;
    }

    /* 터치 피드백 트랜지션 (active:scale-[0.98]) */
    .btn-active {
      transition: transform 0.1s ease-in-out;
    }
    .btn-active:active {
      transform: scale(0.98);
    }
  </style>

  <!-- React & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel CDN (단일 파일에서 JSX를 처리하기 위함) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- State Context (글자 크기 스케일링 헬퍼) ---
    const getTextClasses = (baseSize, scale) => {
      const scales = {
        'DEFAULT': { caption: 'text-[14px]', label: 'text-[16px]', body: 'text-[18px]', bodyLg: 'text-[20px]', title: 'text-[22px]', titleXl: 'text-[24px]', headline: 'text-[28px]', display: 'text-[32px]' },
        'LARGE': { caption: 'text-[16px]', label: 'text-[18px]', body: 'text-[20px]', bodyLg: 'text-[22px]', title: 'text-[24px]', titleXl: 'text-[26px]', headline: 'text-[30px]', display: 'text-[34px]' },
        'VERY_LARGE': { caption: 'text-[18px]', label: 'text-[20px]', body: 'text-[22px]', bodyLg: 'text-[24px]', title: 'text-[26px]', titleXl: 'text-[28px]', headline: 'text-[32px]', display: 'text-[38px]' }
      };
      return scales[scale][baseSize] || scales['DEFAULT'][baseSize];
    };

    // 1. 온보딩 Step 1: 글자 크기
    function OnboardingStep1({ onNext, textSize, setTextSize }) {
      const getStyles = (size) => {
        return textSize === size 
          ? "bg-brand-primary text-white border-2 border-brand-primary font-bold"
          : "bg-white text-text-default border border-border-light font-medium";
      };

      return (
        <div className="flex flex-col h-screen">
          <div className="flex-1 p-5 overflow-y-auto">
            <h1 className={`${getTextClasses('titleXl', textSize)} font-bold text-text-strong mt-6 mb-8`}>
              가장 보기 편한 글자 크기를 골라주세요
            </h1>
            
            {/* 미리보기 카드 */}
            <div className="bg-white rounded-[20px] border border-border-light p-5 shadow-sm mb-10">
              <div className="flex items-center gap-1 mb-2">
                <span className="text-text-muted">ℹ️</span>
                <span className={`${getTextClasses('caption', textSize)} text-text-muted`}>도매 시세 미리보기</span>
              </div>
              <h2 className={`${getTextClasses('bodyLg', textSize)} font-semibold text-text-strong mb-2`}>한우 암컷 등심 (1++ No.9)</h2>
              <div className={`${getTextClasses('display', textSize)} font-extrabold text-brand-red`}>
                98,500<span className={`${getTextClasses('bodyLg', textSize)} ml-1 text-text-strong`}>원</span>
              </div>
            </div>

            {/* 컨트롤 */}
            <div className="flex flex-col gap-3">
              <button className={`w-full h-14 rounded-lg flex items-center justify-center btn-active ${getTextClasses('label', textSize)} ${getStyles('DEFAULT')}`} onClick={() => setTextSize('DEFAULT')}>
                보통
              </button>
              <button className={`w-full h-14 rounded-lg flex items-center justify-center btn-active ${getTextClasses('label', textSize)} ${getStyles('LARGE')}`} onClick={() => setTextSize('LARGE')}>
                크게
              </button>
              <button className={`w-full h-14 rounded-lg flex items-center justify-center btn-active ${getTextClasses('label', textSize)} ${getStyles('VERY_LARGE')}`} onClick={() => setTextSize('VERY_LARGE')}>
                매우 크게
              </button>
            </div>
            
            <p className={`${getTextClasses('body', textSize)} text-text-muted text-center mt-6`}>
              설정하신 크기는 앱 전반에 걸쳐 적용됩니다.
            </p>
          </div>
          
          <div className="footer-fixed h-[96px] flex items-center justify-center px-5 border-t border-divider">
            <button onClick={onNext} className={`w-full h-16 rounded-[20px] bg-brand-primary text-white ${getTextClasses('bodyLg', textSize)} font-semibold flex items-center justify-center gap-2 btn-active`}>
              다음으로 넘어가기 ➔
            </button>
          </div>
        </div>
      );
    }

    // 2. 온보딩 Step 2: 축종 선택
    function OnboardingStep2({ onNext, category, setCategory, textSize }) {
      const getCardStyle = (targetCategory) => {
        if (category === targetCategory) {
          return "border-2 border-brand-primary bg-[#ffedea]";
        }
        return "border border-border-light bg-white shadow-sm";
      };

      return (
        <div className="flex flex-col h-screen relative">
          {/* 반투명 마켓 일러스트 레이어 (더미 패턴으로 연출) */}
          <div className="absolute top-0 left-0 w-full h-64 bg-gray-200 opacity-10 pointer-events-none" style={{ backgroundImage: 'url("https://www.transparenttextures.com/patterns/cubes.png")' }}></div>
          
          <div className="flex-1 p-5 overflow-y-auto relative z-10">
            {/* 오렌지색 인디케이터 바 */}
            <div className="w-16 h-2 bg-brand-primary rounded-full mb-6 mt-4"></div>
            
            <h1 className={`${getTextClasses('titleXl', textSize)} font-bold text-text-strong mb-3`}>
              조회하실 고기 종류를 선택해 주세요
            </h1>
            <p className={`${getTextClasses('body', textSize)} text-text-muted mb-10`}>
              자주 확인하시는 축종을 선택하면 맞춤 정보를 먼저 보여드립니다.
            </p>

            <div className="flex flex-col gap-4">
              {/* 한우 암컷 카드 */}
              <div 
                className={`w-full rounded-[20px] p-5 flex items-center justify-between cursor-pointer btn-active ${getCardStyle('HANWOO')}`}
                onClick={() => setCategory('HANWOO')}
              >
                <div className="flex items-center gap-4">
                  <div className="w-16 h-16 rounded-full bg-surface-soft flex items-center justify-center text-3xl">🐄</div>
                  <span className={`${getTextClasses('title', textSize)} font-bold text-text-strong`}>한우 암컷 시세보기</span>
                </div>
                <span className="text-text-muted text-xl">❯</span>
              </div>

              {/* 한돈 암컷 카드 */}
              <div 
                className={`w-full rounded-[20px] p-5 flex items-center justify-between cursor-pointer btn-active ${getCardStyle('HANDON')}`}
                onClick={() => setCategory('HANDON')}
              >
                <div className="flex items-center gap-4">
                  <div className="w-16 h-16 rounded-full bg-surface-soft flex items-center justify-center text-3xl">🐖</div>
                  <span className={`${getTextClasses('title', textSize)} font-bold text-text-strong`}>한돈 암컷 시세보기</span>
                </div>
                <span className="text-text-muted text-xl">❯</span>
              </div>
            </div>
          </div>

          <div className="footer-fixed h-[96px] flex items-center justify-center px-5 border-t border-divider">
            <button 
              onClick={category ? onNext : null} 
              className={`w-full h-[64px] rounded-[16px] font-semibold flex items-center justify-center gap-2 transition-colors btn-active
                ${category ? 'bg-brand-primary text-white' : 'bg-disabled text-white pointer-events-none'}
                ${getTextClasses('bodyLg', textSize)}`}
            >
              {category ? '✓ 선택 완료하기' : '선택을 완료해 주세요'}
            </button>
          </div>
        </div>
      );
    }

    // 3. 온보딩 Step 3: 부위 검색 및 다중 선택
    function OnboardingStep3({ onNext, category, selectedParts, setSelectedParts, textSize }) {
      const [search, setSearch] = useState("");
      
      const hanwooParts = ['등심', '안심', '채끝', '갈비', '양지', '사태', '부채살'];
      const handonParts = ['삼겹살', '목살', '앞다리살', '뒷다리살', '항정살', '갈비살', '가브리살'];
      
      const currentList = category === 'HANWOO' ? hanwooParts : handonParts;
      const filteredList = currentList.filter(p => p.includes(search));

      const togglePart = (part) => {
        if (selectedParts.includes(part)) {
          setSelectedParts(selectedParts.filter(p => p !== part));
        } else {
          setSelectedParts([...selectedParts, part]);
        }
      };

      return (
        <div className="flex flex-col h-screen">
          {/* 상시 고정 검색 영역 */}
          <div className="header-fixed px-5 pt-4 pb-4 border-b border-divider flex flex-col justify-end">
            <div className="inline-flex items-center px-3 py-1 bg-[#ffedea] text-brand-red rounded-lg font-semibold w-max mb-2">
              <span className={getTextClasses('label', textSize)}>3단계: 관심 부위 검색</span>
            </div>
            <h1 className={`${getTextClasses('titleXl', textSize)} font-bold text-text-strong mb-4`}>
              자주 보시는 부위를 검색해보세요
            </h1>
            
            <div className="relative">
              <span className="absolute left-4 top-1/2 -translate-y-1/2 text-text-light text-xl">🔍</span>
              <input 
                type="text" 
                placeholder="부위 이름 입력 (예: 등심, 삼겹살)"
                value={search}
                onChange={e => setSearch(e.target.value)}
                className={`w-full h-[56px] pl-12 pr-4 rounded-[16px] border border-[#dddddd] focus:border-2 focus:border-brand-primary focus:outline-none ${getTextClasses('body', textSize)} bg-white text-text-strong placeholder-text-light`}
              />
            </div>
          </div>

          <div className="flex-1 p-5 pb-32 overflow-y-auto bg-surface-soft">
            <div className="grid grid-cols-2 gap-[16px]">
              {filteredList.map((part) => {
                const isSelected = selectedParts.includes(part);
                return (
                  <div 
                    key={part}
                    onClick={() => togglePart(part)}
                    className={`h-[120px] flex items-center justify-center relative rounded-xl shadow-sm btn-active cursor-pointer transition-colors
                      ${isSelected ? 'border-2 border-brand-primary bg-[#ffedea]' : 'border border-border-light bg-white'}
                    `}
                  >
                    <span className={`${getTextClasses('title', textSize)} font-bold text-text-strong`}>{part}</span>
                    {isSelected && (
                      <div className="absolute top-3 right-3 text-[#2e7d32] bg-white rounded-full flex items-center justify-center">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                      </div>
                    )}
                  </div>
                )
              })}
            </div>
          </div>

          <div className="footer-fixed h-[96px] flex items-center justify-center px-5 bg-white/90 backdrop-blur-sm border-t border-divider">
            <button 
              onClick={onNext}
              className={`w-full h-[64px] rounded-[16px] bg-brand-primary text-white font-semibold btn-active ${getTextClasses('bodyLg', textSize)}`}
            >
              선택 완료하기
            </button>
          </div>
        </div>
      );
    }

    // 4. 메인 홈 화면
    function MainHome({ onGoDetail, category, selectedParts, textSize }) {
      const partsToRender = selectedParts.length > 0 ? selectedParts : (category === 'HANWOO' ? ['등심'] : ['삼겹살']);
      const isHanwoo = category === 'HANWOO';

      return (
        <div className="flex flex-col h-screen">
          {/* Header 45% / Body 55% 분할을 위한 근사 레이아웃 적용 */}
          <header className="header-fixed flex items-center px-5 h-[72px] shrink-0 border-b border-divider">
            <span className="text-2xl mr-2">🏪</span>
            <h1 className={`${getTextClasses('titleXl', textSize)} font-bold text-text-strong`}>오늘의 암컷 축산물 도매 가격입니다</h1>
          </header>

          <main className="flex-1 overflow-y-auto pb-[96px] flex flex-col">
            {/* 상단 Viewing Zone (종합 지표) */}
            <div className="p-5 bg-white border-b border-border-light pb-8">
              <h2 className={`${getTextClasses('display', textSize)} font-extrabold text-text-strong mb-3`}>축산 시장 종합</h2>
              <div className="inline-flex items-center gap-1 bg-[#ffedea] text-brand-red px-3 py-1.5 rounded-lg mb-6 font-bold">
                <span className={getTextClasses('body', textSize)}>▲ 0.8% 상승</span>
              </div>

              <div className="grid grid-cols-2 gap-4">
                <div className="bg-white rounded-[20px] border border-border-light p-4 shadow-sm">
                  <div className={`${getTextClasses('caption', textSize)} text-text-muted mb-1`}>한우 암컷</div>
                  <div className={`${getTextClasses('title', textSize)} font-bold text-brand-red`}>▲ 1,200</div>
                </div>
                <div className="bg-white rounded-[20px] border border-border-light p-4 shadow-sm">
                  <div className={`${getTextClasses('caption', textSize)} text-text-muted mb-1`}>한돈 암컷</div>
                  <div className={`${getTextClasses('title', textSize)} font-bold text-brand-blue`}>▼ 350</div>
                </div>
              </div>
            </div>

            {/* 하단 Interaction Zone (즐겨찾기 카드 리스트) */}
            <div className="p-5 bg-surface-soft flex-1">
              <h3 className={`${getTextClasses('title', textSize)} font-bold text-text-strong mb-4`}>내 즐겨찾기 시세</h3>
              <div className="flex flex-col gap-[16px]">
                {partsToRender.map((part, idx) => {
                  const isUp = isHanwoo; // 한우는 상승, 한돈은 하락으로 더미 연출
                  const price = isHanwoo ? '21,500' : '18,200';
                  const diff = isHanwoo ? '1,200' : '350';
                  
                  return (
                    <div 
                      key={idx}
                      onClick={() => onGoDetail(part)}
                      className="bg-white rounded-[20px] p-[20px] border border-border-light shadow-sm btn-active cursor-pointer flex flex-col gap-3"
                    >
                      <div className="flex justify-between items-center">
                        <span className={`${getTextClasses('title', textSize)} font-bold text-text-strong`}>
                          {isHanwoo ? '한우 암컷' : '한돈 암컷'} {part}
                        </span>
                        <div className={`flex items-center px-3 py-1.5 rounded-lg font-bold ${getTextClasses('label', textSize)} ${isUp ? 'bg-[#ffedea] text-brand-red' : 'bg-[#edf6fc] text-brand-blue'}`}>
                          {isUp ? '▲' : '▼'} {diff}
                        </div>
                      </div>
                      <div className={`${getTextClasses('display', textSize)} font-extrabold text-text-strong`}>{price}<span className={getTextClasses('bodyLg', textSize)}>원</span></div>
                    </div>
                  );
                })}
              </div>
            </div>
          </main>

          {/* 영구 하단 앵커 내비게이션 (Footer 80px) */}
          <nav className="footer-fixed h-[80px] flex justify-around items-center border-t border-divider px-2">
            <div className="flex flex-col items-center justify-center text-brand-red">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
              <span className={`${getTextClasses('caption', textSize)} font-bold mt-1`}>홈</span>
            </div>
            <div className="flex flex-col items-center justify-center text-text-light">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
              <span className={`${getTextClasses('caption', textSize)} font-bold mt-1`}>즐겨찾기</span>
            </div>
            <div className="flex flex-col items-center justify-center text-text-light">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
              <span className={`${getTextClasses('caption', textSize)} font-bold mt-1`}>설정</span>
            </div>
          </nav>
        </div>
      );
    }

    // 5. 시세 상세 화면
    function DetailPrice({ onBack, part, category, textSize }) {
      const isHanwoo = category === 'HANWOO';
      const price = isHanwoo ? '21,500' : '18,200';
      
      const handleKakaoShare = () => {
        // API_SCHEMA.md 모의 데이터 (JSON)
        const dummyApiData = {
          "status": 200,
          "message": "카카오톡 공유 API 호출 성공",
          "data": {
            "title": `[고기시세] ${isHanwoo ? '한우 암컷' : '한돈 암컷'} ${part} 시세 안내`,
            "price": `${price}원`,
            "trend": isHanwoo ? "상승" : "하락",
            "diff": isHanwoo ? "+1,200원" : "-350원",
            "date": new Date().toISOString()
          }
        };
        console.log("=== [API SIMULATION] Kakao Share Payload ===");
        console.log(JSON.stringify(dummyApiData, null, 2));
        alert("카카오톡으로 공유되었습니다!\n(개발자 도구 콘솔에서 전송된 JSON 데이터를 확인하세요)");
      };

      // 7일 차트 막대 데이터 (격자 제거, 흐름만 노출)
      const chartData = [
        { day: '목', h: '45%' }, { day: '금', h: '50%' }, { day: '토', h: '55%' }, 
        { day: '일', h: '55%' }, { day: '월', h: '60%' }, { day: '화', h: '80%' }, 
        { day: '오늘', h: '100%', isToday: true }
      ];

      return (
        <div className="flex flex-col h-screen bg-surface-soft">
          <header className="header-fixed flex items-center px-2 h-[72px] border-b border-divider">
            <button onClick={onBack} className="w-[48px] h-[48px] flex items-center justify-center btn-active rounded-full bg-white">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <h1 className={`${getTextClasses('titleXl', textSize)} font-bold text-text-strong ml-2`}>
              {isHanwoo ? '한우 암소' : '한돈 암컷'} {part}
            </h1>
          </header>

          <main className="flex-1 overflow-y-auto p-5 pb-[120px]">
            {/* 오늘의 시세 히어로 카드 */}
            <section className="bg-white rounded-[20px] shadow-sm p-6 border border-border-light mb-6 text-center">
              <h2 className={`${getTextClasses('body', textSize)} font-medium text-text-default mb-2`}>오늘의 도매 시세</h2>
              <div className={`${getTextClasses('display', textSize)} font-extrabold text-text-strong mb-3`}>{price}원</div>
              
              <div className={`inline-flex items-center gap-1 px-3 py-1.5 rounded-[8px] font-bold ${getTextClasses('label', textSize)} ${isHanwoo ? 'bg-[#ffedea] text-brand-red' : 'bg-[#edf6fc] text-brand-blue'}`}>
                {isHanwoo ? '▲ 1,200원 (어제보다)' : '▼ 350원 (어제보다)'}
              </div>
            </section>

            {/* 7일 차트 섹션 */}
            <section className="bg-white rounded-[20px] shadow-sm p-6 border border-border-light">
              <h2 className={`${getTextClasses('title', textSize)} font-bold text-text-strong mb-5`}>최근 7일 변동 추이</h2>
              
              <div className="flex items-end justify-between h-[160px] mt-5">
                {chartData.map((d, i) => (
                  <div key={i} className="flex flex-col items-center w-[14%] gap-3">
                    <div 
                      className={`w-[28px] rounded-t-[8px] transition-colors ${d.isToday ? 'bg-brand-primary' : 'bg-surface-soft'}`} 
                      style={{ height: d.h }}
                    ></div>
                    <span className={`${getTextClasses('caption', textSize)} ${d.isToday ? 'text-brand-primary font-bold' : 'text-text-muted font-medium'}`}>
                      {d.day}
                    </span>
                  </div>
                ))}
              </div>
            </section>
          </main>

          <footer className="footer-fixed h-[96px] flex items-center justify-center px-5 border-t border-divider">
            <button onClick={handleKakaoShare} className="w-full h-[64px] rounded-[16px] bg-brand-yellow flex items-center justify-center gap-2 btn-active">
              <span className="text-[24px]">💬</span>
              <span className={`${getTextClasses('bodyLg', textSize)} font-semibold text-text-strong`}>카카오톡으로 오늘 시세 보내기</span>
            </button>
          </footer>
        </div>
      );
    }

    // --- Main App Controller (화면 라우터 및 글로벌 스테이트 매니저) ---
    function App() {
      // 1. 라우팅(Routing) 상태: 사용자가 현재 어느 화면에 있는지 기억합니다.
      const [currentScreen, setCurrentScreen] = useState('STEP1');
      
      // 2. 전역 설정 상태(State): 모든 화면에서 공유해야 하는 앱 세팅값들입니다.
      const [textSize, setTextSize] = useState('DEFAULT'); // 글자 크기
      const [category, setCategory] = useState(null); // 'HANWOO' or 'HANDON' (축종)
      const [selectedParts, setSelectedParts] = useState([]); // 선택한 부위들
      
      // 3. 상세 화면용 파라미터 상태
      const [detailPart, setDetailPart] = useState(''); // 클릭한 부위의 이름

      return (
        <div className="app-container shadow-2xl">
          {currentScreen === 'STEP1' && (
            <OnboardingStep1 
              onNext={() => setCurrentScreen('STEP2')} 
              textSize={textSize} 
              setTextSize={setTextSize} 
            />
          )}
          {currentScreen === 'STEP2' && (
            <OnboardingStep2 
              onNext={() => setCurrentScreen('STEP3')} 
              category={category} 
              setCategory={setCategory} 
              textSize={textSize}
            />
          )}
          {currentScreen === 'STEP3' && (
            <OnboardingStep3 
              onNext={() => setCurrentScreen('MAIN')} 
              category={category} 
              selectedParts={selectedParts} 
              setSelectedParts={setSelectedParts} 
              textSize={textSize}
            />
          )}
          {currentScreen === 'MAIN' && (
            <MainHome 
              onGoDetail={(part) => { setDetailPart(part); setCurrentScreen('DETAIL'); }}
              category={category}
              selectedParts={selectedParts}
              textSize={textSize}
            />
          )}
          {currentScreen === 'DETAIL' && (
            <DetailPrice 
              onBack={() => setCurrentScreen('MAIN')}
              part={detailPart}
              category={category}
              textSize={textSize}
            />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
